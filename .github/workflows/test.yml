name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Coverage summary
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/lcov.info ]; then
            total_lines=$(grep -c "^DA:" coverage/lcov.info || true)
            hit_lines=$(grep "^DA:" coverage/lcov.info | grep -v ",0$" | wc -l || true)
            if [ "$total_lines" -gt 0 ]; then
              pct=$((hit_lines * 100 / total_lines))
              echo "**Overall: ${pct}% (${hit_lines}/${total_lines} lines)**" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No coverage data generated." >> $GITHUB_STEP_SUMMARY
          fi

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version update (4-file set)
        run: |
          echo "## Version Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          errors=0

          # 1. pubspec.yaml のバージョンが main と異なるか
          MAIN_VERSION=$(git show origin/main:pubspec.yaml | grep '^version:' | sed 's/version: //' | sed 's/+.*//')
          PR_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          if [ "$MAIN_VERSION" = "$PR_VERSION" ]; then
            echo "::error::pubspec.yaml のバージョンが更新されていません（現在: $PR_VERSION）"
            echo "- :x: pubspec.yaml のバージョン未更新（$PR_VERSION）" >> $GITHUB_STEP_SUMMARY
            errors=$((errors + 1))
          else
            echo "- :white_check_mark: pubspec.yaml: $MAIN_VERSION → $PR_VERSION" >> $GITHUB_STEP_SUMMARY
          fi

          # 2. app_version.dart の appVersion が PR バージョンと一致するか
          APP_VERSION=$(grep "const appVersion" lib/app_version.dart | sed "s/.*= '//;s/'.*//" )
          if [ "$APP_VERSION" != "$PR_VERSION" ]; then
            echo "::error::app_version.dart の appVersion ($APP_VERSION) が pubspec.yaml ($PR_VERSION) と不一致"
            echo "- :x: app_version.dart: appVersion=$APP_VERSION（期待: $PR_VERSION）" >> $GITHUB_STEP_SUMMARY
            errors=$((errors + 1))
          else
            echo "- :white_check_mark: app_version.dart: appVersion=$APP_VERSION" >> $GITHUB_STEP_SUMMARY
          fi

          # 3. releaseHistory に PR バージョンのエントリがあるか
          if grep -q "version: '$PR_VERSION'" lib/app_version.dart; then
            echo "- :white_check_mark: releaseHistory にエントリあり" >> $GITHUB_STEP_SUMMARY
          else
            echo "::error::app_version.dart の releaseHistory に v$PR_VERSION のエントリがありません"
            echo "- :x: releaseHistory にエントリなし" >> $GITHUB_STEP_SUMMARY
            errors=$((errors + 1))
          fi

          # 4. announcements.json に PR バージョンのエントリがあるか
          if grep -q "release:$PR_VERSION" assets/announcements.json; then
            echo "- :white_check_mark: announcements.json にエントリあり" >> $GITHUB_STEP_SUMMARY
          else
            echo "::error::announcements.json に release:$PR_VERSION のエントリがありません"
            echo "- :x: announcements.json にエントリなし" >> $GITHUB_STEP_SUMMARY
            errors=$((errors + 1))
          fi

          # 結果
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$errors" -gt 0 ]; then
            echo "**:x: $errors 件のバージョン更新漏れがあります**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "**:white_check_mark: バージョン更新チェック OK**" >> $GITHUB_STEP_SUMMARY
          fi
